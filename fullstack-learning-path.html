<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Stack Dev — 90-Day Learning Path</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --surface3: #222233;
  --border: #2a2a3d;
  --text: #e8e8f0;
  --text-dim: #8888a8;
  --text-muted: #55556a;
  --accent-js: #f7df1e;
  --accent-react: #61dafb;
  --accent-node: #68a063;
  --accent-mongo: #4db33d;
  --accent-pg: #336791;
  --accent-project: #ff6b6b;
  --accent-dsa: #e879f9;
  --check: #22c55e;
  --glow-js: rgba(247,223,30,0.1);
  --glow-react: rgba(97,218,251,0.1);
  --glow-node: rgba(104,160,99,0.1);
  --glow-mongo: rgba(77,179,61,0.1);
  --glow-pg: rgba(51,103,145,0.1);
  --glow-project: rgba(255,107,107,0.1);
  --glow-dsa: rgba(232,121,249,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

.noise {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }

header {
  text-align: center;
  padding: 48px 0 36px;
  position: relative;
}

header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(97,218,251,0.06) 0%, transparent 70%);
  pointer-events: none;
}

h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 900;
  letter-spacing: -1.5px;
  line-height: 1.1;
  background: linear-gradient(135deg, #fff 0%, #61dafb 50%, #f7df1e 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.subtitle {
  color: var(--text-dim);
  font-size: 1.05rem;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* Stats Bar */
.stats-bar {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 28px 0 12px;
}

.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 18px;
  font-size: 0.85rem;
  font-family: 'JetBrains Mono', monospace;
  display: flex; align-items: center; gap: 8px;
}

.stat-chip .num { font-weight: 700; color: var(--check); }

/* Progress */
.progress-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  margin: 20px 0 32px;
}

.progress-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}

.progress-header span { font-size: 0.9rem; color: var(--text-dim); }
.progress-header .pct { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--check); font-size: 1.1rem; }

.progress-track {
  width: 100%; height: 8px;
  background: var(--surface3);
  border-radius: 100px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 100px;
  background: linear-gradient(90deg, #22c55e, #61dafb);
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Phase Tabs */
.phase-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
  overflow-x: auto;
  padding-bottom: 4px;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.phase-tabs::-webkit-scrollbar { display: none; }

.phase-tab {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
}

.phase-tab:hover { border-color: #444; color: var(--text); }
.phase-tab.active { background: var(--surface3); border-color: #555; color: #fff; font-weight: 600; }

/* Phase Section */
.phase-section { margin-bottom: 36px; animation: fadeUp 0.4s ease; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.phase-title-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  padding: 0 4px;
}

.phase-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  font-weight: 800;
  flex-shrink: 0;
}

.phase-title-bar h2 {
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.phase-title-bar .phase-range {
  font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-muted);
  margin-left: auto;
}

/* Day Card */
.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.day-card:hover { border-color: #3a3a50; }
.day-card.completed { border-color: rgba(34,197,94,0.25); }
.day-card.completed .day-header { opacity: 0.7; }

.day-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
}

.day-check {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 6px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
}

.day-check:hover { border-color: var(--check); }

.day-check.checked {
  background: var(--check);
  border-color: var(--check);
}

.day-check.checked::after {
  content: '✓';
  color: #000;
  font-size: 13px;
  font-weight: 700;
}

.day-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 48px;
}

.day-title {
  font-size: 0.92rem;
  font-weight: 500;
  flex: 1;
}

.day-tags {
  display: flex; gap: 5px; flex-shrink: 0;
}

.tag {
  font-size: 0.65rem;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: 'JetBrains Mono', monospace;
}

.tag-js { background: rgba(247,223,30,0.12); color: #f7df1e; }
.tag-react { background: rgba(97,218,251,0.12); color: #61dafb; }
.tag-node { background: rgba(104,160,99,0.12); color: #68a063; }
.tag-mongo { background: rgba(77,179,61,0.12); color: #4db33d; }
.tag-pg { background: rgba(51,103,145,0.15); color: #6b9fcf; }
.tag-project { background: rgba(255,107,107,0.12); color: #ff6b6b; }
.tag-dsa { background: rgba(232,121,249,0.12); color: #e879f9; }

.day-expand {
  color: var(--text-muted);
  font-size: 0.8rem;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.day-expand.open { transform: rotate(180deg); }

/* Day Body */
.day-body {
  display: none;
  padding: 0 16px 16px 52px;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.day-body.open { display: block; }

.topic-list {
  list-style: none;
  margin-bottom: 14px;
}

.topic-list li {
  font-size: 0.85rem;
  color: var(--text-dim);
  padding: 3px 0;
  padding-left: 16px;
  position: relative;
}

.topic-list li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.75rem;
}

.practice-section h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
}

.practice-links {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.practice-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  padding: 5px 12px;
  border-radius: 8px;
  background: var(--surface3);
  border: 1px solid var(--border);
  color: var(--text-dim);
  text-decoration: none;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}

.practice-link:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: #555;
  transform: translateY(-1px);
}

.practice-link .pl-icon { font-size: 0.7rem; }

/* Reset button */
.reset-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.8rem;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  z-index: 10;
  transition: all 0.2s;
}

.reset-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

@media (max-width: 700px) {
  .day-header { padding: 12px; gap: 8px; }
  .day-body { padding-left: 16px; }
  .day-tags { display: none; }
  .phase-title-bar .phase-range { display: none; }
  .stats-bar { gap: 8px; }
  .stat-chip { padding: 6px 12px; font-size: 0.78rem; }
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <header>
    <h1>Full Stack Developer<br>90-Day Path</h1>
    <p class="subtitle">JS → React → Node/Express → MongoDB → PostgreSQL → Job Ready</p>
  </header>

  <div class="stats-bar">
    <div class="stat-chip"><span class="num" id="completedCount">0</span> / <span id="totalCount">0</span> Days Done</div>
    <div class="stat-chip">🔥 Streak: <span class="num" id="streakCount">0</span></div>
  </div>

  <div class="progress-wrapper">
    <div class="progress-header">
      <span>Overall Progress</span>
      <span class="pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <div class="phase-tabs" id="phaseTabs"></div>
  <div id="content"></div>
</div>

<button class="reset-btn" onclick="resetProgress()">↺ Reset Progress</button>

const STORAGE_KEY = "fsd90_progress";

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

let progress = loadProgress();
let activePhase = 0;

function getTotal() { return DATA.reduce((s, p) => s + p.days.length, 0); }
function getCompleted() { return Object.keys(progress).filter(k => progress[k]).length; }

function calcStreak() {
  let streak = 0;
  const completedDays = Object.keys(progress).filter(k => progress[k]).map(Number).sort((a,b) => b - a);
  if (!completedDays.length) return 0;
  // Simple: count consecutive completed from latest
  for (let i = 0; i < completedDays.length; i++) {
    if (i === 0 || completedDays[i] === completedDays[i-1] - 1) streak++;
    else break;
  }
  return streak;
}

function updateStats() {
  const total = getTotal();
  const completed = getCompleted();
  const pct = total ? Math.round((completed / total) * 100) : 0;
  document.getElementById("completedCount").textContent = completed;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("streakCount").textContent = calcStreak();
}

function tagHTML(tag) {
  const map = { js: "tag-js", react: "tag-react", node: "tag-node", mongo: "tag-mongo", pg: "tag-pg", project: "tag-project", dsa: "tag-dsa" };
  const labels = { js: "JS", react: "React", node: "Node", mongo: "Mongo", pg: "PgSQL", project: "Project", dsa: "DSA" };
  return `<span class="tag ${map[tag]}">${labels[tag]}</span>`;
}

function renderPhase(idx) {
  const phase = DATA[idx];
  let html = `<div class="phase-section">
    <div class="phase-title-bar">
      <div class="phase-icon" style="background:${phase.color}22;color:${phase.color}">${phase.icon}</div>
      <h2>${phase.phase}</h2>
      <span class="phase-range">${phase.range}</span>
    </div>`;

  phase.days.forEach(d => {
    const checked = !!progress[d.day];
    html += `<div class="day-card ${checked ? 'completed' : ''}" id="card-${d.day}">
      <div class="day-header" onclick="toggleBody(${d.day})">
        <div class="day-check ${checked ? 'checked' : ''}" onclick="event.stopPropagation();toggleCheck(${d.day})"></div>
        <span class="day-num">DAY ${String(d.day).padStart(2,'0')}</span>
        <span class="day-title">${d.title}</span>
        <div class="day-tags">${d.tags.map(tagHTML).join('')}</div>
        <span class="day-expand" id="arrow-${d.day}">▼</span>
      </div>
      <div class="day-body" id="body-${d.day}">
        <ul class="topic-list">${d.topics.map(t => `<li>${t}</li>`).join('')}</ul>
        <div class="practice-section">
          <h4>⚡ Practice & Resources</h4>
          <div class="practice-links">${d.practice.map(p =>
            `<a class="practice-link" href="${p.url}" target="_blank" rel="noopener"><span class="pl-icon">↗</span>${p.name}</a>`
          ).join('')}</div>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function renderTabs() {
  const container = document.getElementById("phaseTabs");
  container.innerHTML = DATA.map((p, i) =>
    `<button class="phase-tab ${i === activePhase ? 'active' : ''}" onclick="switchPhase(${i})">${p.range.split(':')[0] || p.range}</button>`
  ).join('');
}

function switchPhase(idx) {
  activePhase = idx;
  renderTabs();
  renderPhase(idx);
}

function toggleCheck(day) {
  progress[day] = !progress[day];
  saveProgress(progress);
  const card = document.getElementById(`card-${day}`);
  const check = card.querySelector('.day-check');
  if (progress[day]) {
    check.classList.add('checked');
    card.classList.add('completed');
  } else {
    check.classList.remove('checked');
    card.classList.remove('completed');
  }
  updateStats();
}

function toggleBody(day) {
  const body = document.getElementById(`body-${day}`);
  const arrow = document.getElementById(`arrow-${day}`);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function resetProgress() {
  if (confirm("Reset all progress? This cannot be undone.")) {
    progress = {};
    saveProgress(progress);
    renderPhase(activePhase);
    updateStats();
  }
}

// Init
renderTabs();
renderPhase(0);
updateStats();
